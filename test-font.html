    }
    html += '</div>';

    const testStrings = ["USA", "CANADA", "MEXICO", "MATCH CENTRE", "2026"];
    for (const str of testStrings) {
      html += `<div class="row" style="height: 60px; color: #00c853;">`;
      for (const char of str.split('')) {
        if (char === ' ') {
          html += `<div style="display:inline-block; width: 30px;"></div>`;
          continue;
        }
        const g = GLYPHS[char];
        html += `<svg viewBox="0 0 ${g.w} 100" style="height: 100%; width: ${g.w * 0.6}px; margin-right: 4px;"><path fill-rule="evenodd" d="${g.d}"/></svg>`;

      html += `</div>`;
    }

    out.innerHTML = html;
