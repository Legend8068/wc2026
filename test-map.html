<!DOCTYPE html>
<html>
<body>
<div id="container" style="background:#1a1a1a; width: 1000px;"></div>
<script>
  fetch('src/assets/WC_map.svg')
    .then(r => r.text())
    .then(svg => {
      document.getElementById('container').innerHTML = svg;
      const paths = document.querySelectorAll('path');
      paths.forEach((p, i) => {
        p.setAttribute('title', 'Path ' + i);
        p.setAttribute('stroke', 'red');
        p.setAttribute('stroke-width', '1');
        p.setAttribute('fill', 'rgba(255,255,255,0.5)');
      });
    });
</script>
</body>
</html>
